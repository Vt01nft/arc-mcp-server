[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.default.rpc_endpoints]
arc_testnet = "https://rpc.testnet.arc.network"

[profile.default.etherscan]
arc_testnet = { key = "${ARCSCAN_API_KEY}", url = "https://testnet.arcscan.app/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
